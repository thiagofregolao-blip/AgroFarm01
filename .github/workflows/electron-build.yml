name: Build Electron App

on:
  push:
    tags:
      - "v*"         # Dispara ao criar tag: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # Permite rodar manualmente no GitHub

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build macOS (.dmg)
        working-directory: electron
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgroFarm-mac
          path: electron/dist/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows (.exe)
        working-directory: electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgroFarm-windows
          path: electron/dist/*.exe
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgroFarm-mac/*.dmg
            AgroFarm-windows/*.exe
          generate_release_notes: false
          body: |
            ## AgroFarm Digital ${{ github.ref_name }}

            ### Download
            - **macOS** → baixe o arquivo `.dmg`
            - **Windows** → baixe o arquivo `.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
